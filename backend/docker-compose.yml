version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=development
    volumes:
      # Hot-reload in dev: mount source so uvicorn picks up changes
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
